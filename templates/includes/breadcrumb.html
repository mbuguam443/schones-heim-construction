{% load core_tags %}
{% if items %}
<nav aria-label="breadcrumb" class="mb-3">
  <ol class="breadcrumb mb-0 small">
    <li class="breadcrumb-item">
      <a href="{% url 'core:dashboard' %}"><i class="fas fa-home me-1"></i>Home</a>
    </li>
    {% for item in items|split:',' %}
      {% if forloop.last %}
        <li class="breadcrumb-item active" aria-current="page">{{ item|cut:' ' }}</li>
      {% else %}
        <li class="breadcrumb-item">{{ item|cut:' ' }}</li>
      {% endif %}
    {% endfor %}
  </ol>
</nav>
{% endif %}

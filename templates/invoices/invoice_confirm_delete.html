{% extends 'base.html' %}
{% block title %}Delete Invoice{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="fas fa-exclamation-triangle"></i> Confirm Deletion</h5>
            </div>
            <div class="card-body text-center py-5">
                <i class="fas fa-receipt" style="font-size:4rem;color:#dc3545;"></i>
                <h4 class="mt-3">Delete Invoice {{ inv.invoice_number }}?</h4>
                <p class="text-muted">This action cannot be undone. All items and payment records will be removed.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i> Yes, Delete</button>
                        <a href="{% url 'invoices:detail' inv.pk %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

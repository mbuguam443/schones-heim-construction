services:
  - type: web
    name: schones-heim-construction
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi --bind 0.0.0.0:$PORT --workers 4
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: true
      - key: ALLOWED_HOSTS
        value: schones-heim-construction.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://schones-heim-construction.onrender.com
      - key: DB_ENGINE
        value: django.db.backends.sqlite3
      - key: DB_NAME
        value: construction_db

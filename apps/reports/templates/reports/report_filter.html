<form method="get" class="row g-3 align-items-end">
  {% if form.date_from %}
  <div class="col-md-2">
    <label class="form-label small fw-semibold">{{ form.date_from.label }}</label>
    {{ form.date_from }}
  </div>
  {% endif %}
  {% if form.date_to %}
  <div class="col-md-2">
    <label class="form-label small fw-semibold">{{ form.date_to.label }}</label>
    {{ form.date_to }}
  </div>
  {% endif %}
  {% if form.project %}
  <div class="col-md-3">
    <label class="form-label small fw-semibold">{{ form.project.label }}</label>
    {{ form.project }}
  </div>
  {% endif %}
  {% if form.report_type %}
  <div class="col-md-2">
    <label class="form-label small fw-semibold">{{ form.report_type.label }}</label>
    {{ form.report_type }}
  </div>
  {% endif %}
  <div class="col-md-3">
    <label class="form-label small fw-semibold">&nbsp;</label>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-filter me-1"></i>Filter
      </button>
      <a href="{{ request.path }}" class="btn btn-outline-secondary">
        <i class="fas fa-undo me-1"></i>Reset
      </a>
    </div>
  </div>
</form>
